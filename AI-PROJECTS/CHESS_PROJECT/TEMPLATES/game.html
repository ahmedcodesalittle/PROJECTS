<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="game-page">

  <div class="game-wrap">

    <!-- Left: your moves -->
    <div class="side-panel left-panel">
      <div class="side-panel-title">Your Moves</div>
      <div id="playerMoves" class="move-list"></div>
      <div class="score-box score-player">
        <span class="score-label">Your Score</span>
        <span class="score-val" id="playerScore">0</span>
        <span class="score-unit">pts</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board-area">
      <div class="file-labels" id="fileLabels">
        <span>a</span><span>b</span><span>c</span><span>d</span>
        <span>e</span><span>f</span><span>g</span><span>h</span>
      </div>
      <div class="rank-and-board">
        <div class="rank-labels" id="rankLabels">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>
        <div id="board" class="board"></div>
      </div>
      <div class="adv-row">
        <span class="adv-label">Material</span>
        <span id="advantage" class="adv-badge adv-even">Even</span>
      </div>
    </div>

    <!-- Right: info + bot moves -->
    <div class="side-panel right-panel">
      <div class="panel-logo">
        <span>&#9818;</span>
        <span class="panel-title">Chess AI</span>
      </div>
      <div class="panel-info">
        <div class="info-row"><span class="lbl">Level</span><span class="val" id="iLevel">{{ level|capitalize }}</span></div>
        <div class="info-row"><span class="lbl">Algorithm</span><span class="val algo-val">{{ algo }}</span></div>
        <div class="info-row"><span class="lbl">You play</span><span class="val" id="iColor">{{ color|capitalize }}</span></div>
        <div class="info-row"><span class="lbl">Turn</span><span class="val" id="iTurn">White</span></div>
        <div class="info-row"><span class="lbl">Move</span><span class="val" id="iMove">1</span></div>
        <div class="info-row"><span class="lbl">Status</span><span class="val" id="iStatus">Playing</span></div>
      </div>

      <div id="thinking" class="thinking" hidden>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        Bot is thinking...
      </div>

      <div class="side-panel-title" style="margin-top:auto;">Bot Moves</div>
      <div id="botMoves" class="move-list"></div>

      <div class="score-box score-bot">
        <span class="score-label">Bot Score</span>
        <span class="score-val" id="botScore">0</span>
        <span class="score-unit">pts</span>
      </div>

      <a class="new-btn" href="/">&#8592; Exit to Menu</a>
    </div>

  </div>

  <!-- Game over modal -->
  <div id="modal" class="modal-bg" hidden>
    <div class="modal-box">
      <div class="modal-icon" id="mIcon">&#9812;</div>
      <h2 class="modal-title" id="mTitle">Game Over</h2>
      <p class="modal-msg" id="mMsg"></p>
      <div id="mMistakes" class="mistake-box" hidden></div>
      <div class="modal-actions">
        <button class="modal-action-btn btn-restart" id="playAgainBtn">&#9654; Play Again</button>
        <a class="modal-action-btn btn-exit" href="/">&#8592; Exit</a>
      </div>
    </div>
  </div>

  <script>
    window.PLAYER_COLOR = "{{ color }}";
    window.LEVEL        = "{{ level }}";
  </script>
  <script src="/static/js/game.js"></script>
</body>
</html>
